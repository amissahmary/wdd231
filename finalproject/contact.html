    <main>
        <section class="contact-section">
            <h1>Join or Support The Ministry</h1>
            <p>If you are interested in supporting our work or joining the ministry, please complete the form below so
                we can connect with you.</p>
            <form action="submit_form.php" method="post" class="contact-form">
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="full-name" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="+233 24 123 4567" required>

                <label for="location">Location:</label>
                <input type="text" id="location" name="location" placeholder="City, Region" required>

                <label for="interest-type">I am interested in:</label>
                <select id="interest-type" name="interest-type" required>
                    <option value="">Choose one</option>
                    <option value="support">Supporting the ministry</option>
                    <option value="join">Joining the ministry</option>
                    <option value="volunteer">Volunteering</option>
                    <option value="partner">Partnership opportunities</option>
                </select>

                <label for="interest-area">Area of Interest:</label>
                <textarea id="interest-area" name="interest-area" rows="4"
                    placeholder="Tell us how you would like to help or get involved." required></textarea>

                <label for="availability">Availability:</label>
                <input type="text" id="availability" name="availability"
                    placeholder="e.g. Weekends, evenings, specific dates">

                <label for="hear-about">How did you hear about us?</label>
                <input type="text" id="hear-about" name="hear-about" placeholder="Friend, social media, church, etc.">

                <label for="message">Additional Message:</label>
                <textarea id="message" name="message" rows="4"
                    placeholder="Any other details you'd like us to know."></textarea>

                <h2><a href="thankyou.html"><button type="submit">Submit Interest</button></a></h2>
            </form>
        </section>
    </main>
